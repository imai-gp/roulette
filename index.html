<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&family=Poppins:wght@700&display=swap" rel="stylesheet">
    <title>TALK SPIN!</title>
    <style>
        :root {
            color-scheme: light;
            --bg: #fafcff;
            --navy: #09122b;
            --muted: #798394;
            --wheel-size: min(66vh, 92vw, 900px);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Noto Sans JP", sans-serif;
            background: var(--bg);
            color: var(--navy);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            padding: 24px;
        }

        .stage {
            width: calc(100vw - 160px);
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            container-type: inline-size;
        }

        /* ---- The single roulette wheel: peeks at the bottom while idle, ---- */
        /* ---- then rises to the centre and spins — never swapped for another element ---- */
        .wheel-float {
            position: fixed;
            left: 50%;
            top: 100%;
            width: var(--wheel-size);
            aspect-ratio: 1;
            transform: translate(-50%, -33.333%);
            transition: top 0.85s cubic-bezier(.22, .61, .36, 1),
                        transform 0.85s cubic-bezier(.22, .61, .36, 1),
                        opacity 0.4s ease;
            pointer-events: none;
            z-index: -1;
        }
        .wheel-float.center {
            top: 50%;
            transform: translate(-50%, -50%);
        }
        .wheel-float.hidden {
            opacity: 0;
        }

        /* ---- Idle: title / subtitle / start button ---- */
        .intro {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3vw;
            padding: 6px;
            margin-bottom: 56px;
            opacity: 1;
            transform: translateY(-9vh);
            transition: opacity 0.35s ease, transform 0.4s ease;
        }

        .intro.hidden {
            opacity: 0;
            transform: translateY(calc(-9vh - 24px));
            pointer-events: none;
        }

        .intro.collapsed {
            display: none;
        }

        .logo {
            margin: 0;
            font-family: "Poppins", sans-serif;
            font-weight: 700;
            font-size: clamp(2rem, 16cqw, 20rem);
            letter-spacing: -0.03em;
            line-height: 1;
        }

        .subtitle {
            margin: 0;
            color: var(--muted);
            font-weight: 700;
            font-size: clamp(0.85rem, 2.6cqw, 2rem);
        }

        .btn-primary {
            min-width: 20cqw;
            max-width: 34cqw;
            padding: 1.8cqw 3.2cqw;
            border: none;
            border-radius: 999px;
            background: var(--navy);
            color: var(--bg);
            font-weight: 700;
            font-size: clamp(0.9rem, 2.6cqw, 6rem);
            cursor: pointer;
            transition: transform 0.2s ease, filter 0.2s ease, opacity 0.2s ease;
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            filter: brightness(1.25);
        }

        .btn-primary:active:not(:disabled) {
            transform: translateY(0) scale(0.97);
        }

        .btn-primary:disabled {
            opacity: 0.45;
            cursor: not-allowed;
        }

        .scene {
            position: relative;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* ---- Wheel ---- */
        .wheel-wrap {
            position: relative;
            width: 100%;
            height: 100%;
            container-type: inline-size;
        }

        .wheel {
            position: absolute;
            inset: 0;
            border-radius: 50%;
            background: var(--bg);
            border: 14px solid var(--navy);
            overflow: hidden;
            transform: rotate(0deg);
        }

        .wheel-separator {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 50%;
            height: 2px;
            background: rgba(9, 18, 43, 0.45);
            transform-origin: 0 50%;
        }

        .wheel-label-wrap {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 50%;
            height: 0;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            transform-origin: 0 0;
        }

        .wheel-label {
            display: inline-block;
            margin-right: 8%;
            font-family: "Poppins", sans-serif;
            font-weight: 700;
            color: var(--navy);
            white-space: nowrap;
            transition: opacity 0.18s ease;
        }

        .wheel-label.landed {
            animation: segmentBlink 0.32s ease-in-out 3;
        }

        .pin {
            position: absolute;
            top: -16px;
            left: 50%;
            width: 0;
            height: 0;
            transform: translateX(-50%);
            z-index: 2;
        }

        .pin.bounce {
            animation: pinBounce 0.22s ease-out;
        }

        .pin-shape {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            width: 28px;
            height: 28px;
            margin-left: -14px;
            background: var(--navy);
            border-radius: 50% 50% 50% 0;
            transform: rotate(-45deg);
            transform-origin: center;
        }

        .hub {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 26%;
            aspect-ratio: 1;
            border-radius: 50%;
            background: var(--navy);
            color: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-family: "Poppins", sans-serif;
            font-weight: 700;
            font-size: clamp(0.8rem, 7cqw, 1.4rem);
            line-height: 1.15;
            z-index: 1;
        }

        /* ---- Result ---- */
        .result-area {
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 5vw;
            width: 100%;
            opacity: 0;
            transform: translateY(30px) scale(0.95);
            transition: opacity 0.45s ease, transform 0.45s ease;
        }

        .result-area.visible {
            opacity: 1;
            transform: translateY(0) scale(1);
        }

        .result-text {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 24px;
            transition: opacity 0.22s ease;
        }

        .result-text.swapping {
            opacity: 0;
        }

        .result-name {
            margin: 0;
            font-family: "Poppins", sans-serif;
            font-weight: 700;
            letter-spacing: -0.03em;
            font-size: clamp(2rem, 11cqw, 20rem);
            line-height: 1.05;
            word-break: break-word;
        }

        .result-theme {
            margin: 0;
            font-weight: 700;
            font-size: clamp(0.85rem, 2.6cqw, 3rem);
            color: var(--navy);
        }

        .result-buttons {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 1.6cqw;
        }

        .visually-hidden {
            position: absolute;
            width: 1px;
            height: 1px;
            margin: -1px;
            padding: 0;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }

        @keyframes pinBounce {
            0% { transform: translateX(-50%) translateY(0); }
            35% { transform: translateX(-50%) translateY(-12px); }
            100% { transform: translateX(-50%) translateY(0); }
        }

        @keyframes segmentBlink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.2; }
        }

        .confetti-container {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 5;
        }

        .confetti {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            opacity: 0;
            filter: drop-shadow(0 0 8px rgba(9, 18, 43, 0.25));
            animation: confetti-burst cubic-bezier(.18, .7, .3, 1) forwards;
        }

        @keyframes confetti-burst {
            0% { transform: translate(-50%, -50%) translate(0, 0) rotate(0deg) scale(0.4); opacity: 0; }
            12% { opacity: 1; }
            100% { transform: translate(-50%, -50%) translate(var(--tx), var(--ty)) rotate(var(--rot)) scale(var(--scale)); opacity: 0; }
        }

        @media (max-width: 560px) {
            .btn-primary {
                width: 100%;
                min-width: unset;
                max-width: unset;
            }

            .result-buttons {
                flex-direction: column;
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="wheel-float" id="wheelFloat">
        <div class="wheel-wrap">
            <div class="pin" id="pin"><span class="pin-shape"></span></div>
            <div class="wheel" id="wheel"></div>
            <div class="hub"><span>SPIN TALK!</span></div>
        </div>
    </div>
    <div class="stage">
        <div class="intro" id="intro">
            <h1 class="logo">SPIN TALK!</h1>
            <p class="subtitle">今日の発表者とトークテーマを決めよう！</p>
            <button id="spinButton" class="btn-primary">ルーレットを回す</button>
        </div>

        <div class="scene">
            <div class="result-area" id="resultArea">
                <div class="result-text" id="resultText">
                    <p class="result-name" id="resultName"></p>
                    <p class="result-theme" id="resultTheme"></p>
                </div>
                <div class="result-buttons">
                    <button id="redrawButton" class="btn-primary">再抽選</button>
                    <button id="themeOnlyButton" class="btn-primary">テーマだけやり直す</button>
                </div>
                <p id="resultStatus" class="visually-hidden" role="status" aria-live="polite" aria-atomic="true"></p>
            </div>
        </div>
    </div>
    <div id="confetti-container" class="confetti-container"></div>

    <script>
        const presenters = [
            "IMAI", "SHIOZAKI", "TERAJIMA", "TATSUMI", "KINUGAWA", "KAWAHARA", "TANAKA", "TAKADA"
        ];

        const themes = [
            "最近見かけた「このサイト良いな」と思った理由は？",
            "自分のデザインの癖って何だと思う？",
            "フォントを1つだけ一生使うなら何を選ぶ？",
            "デザインしていて一番テンション上がる瞬間は？",
            "「これ苦手なんだよな…」な制作物ある？",
            "Webデザインで最近増えたなと思う表現は？",
            "自分のデザインを3ワードで表すと？",
            "レイアウトで困った時、最初に何する？",
            "一番好きな余白感ってどんな感じ？",
            "「これはセンスじゃなく技術だな」と思うことは？",
            "制作で一番時間を溶かしがちな工程は？",
            "今の仕事道具で一番手放せないものは？",
            "「新人の頃に知りたかった…」と思うことは？",
            "集中したい時のルーティンある？",
            "レビューされる側・する側、どっちが疲れる？",
            "もし1週間だけ別職種やるなら何やりたい？",
            "締切直前に発揮される謎スキルある？",
            "AIで一番助かってる作業って何？",
            "AIに奪われそうより、増えそうと思う仕事は？",
            "AI生成で「ここまだ人だな」と思う部分は？",
            "AIツールを禁止されたら一番困るものは？",
            "AIで作ったもの、どこまで自分の成果物だと思う？",
            "「AI時代に伸ばしたい能力」って何？",
            "デザイナーあるあるを1つ言うなら？",
            "制作中のBGM、無音派？音楽派？環境音派？"
        ];

        const intro = document.getElementById('intro');
        const wheelFloat = document.getElementById('wheelFloat');
        const resultArea = document.getElementById('resultArea');
        const wheel = document.getElementById('wheel');
        const pin = document.getElementById('pin');
        const spinButton = document.getElementById('spinButton');
        const redrawButton = document.getElementById('redrawButton');
        const themeOnlyButton = document.getElementById('themeOnlyButton');
        const resultText = document.getElementById('resultText');
        const resultName = document.getElementById('resultName');
        const resultTheme = document.getElementById('resultTheme');
        const resultStatus = document.getElementById('resultStatus');
        const confettiContainer = document.getElementById('confetti-container');

        const SEGMENT_ANGLE = 360 / presenters.length;

        let currentRotation = 0;
        let currentPresenter = '';
        let currentTheme = '';
        let isBusy = false;

        function pickIndex(list) {
            return Math.floor(Math.random() * list.length);
        }

        function easeOutCubic(t) {
            return 1 - Math.pow(1 - t, 3);
        }

        function setBusy(state) {
            isBusy = state;
            spinButton.disabled = state;
            redrawButton.disabled = state;
            themeOnlyButton.disabled = state;
            document.body.setAttribute('aria-busy', state ? 'true' : 'false');
        }

        // ホイールの実寸（コンテナクエリ単位 cqw）に連動させ、
        // ビューポート基準だとホイールの最大幅キャップとサイズがズレて
        // 文字がはみ出す事態を避ける。clampで読みやすさの上下限も確保する。
        function labelFontSize(name) {
            if (name.length <= 4) return 'clamp(13px, 5.6cqw, 64px)';
            if (name.length <= 6) return 'clamp(11px, 4.6cqw, 54px)';
            if (name.length <= 8) return 'clamp(10px, 3.8cqw, 44px)';
            return 'clamp(9px, 3.2cqw, 38px)';
        }

        function buildWheel() {
            wheel.innerHTML = '';
            presenters.forEach((name, i) => {
                const separator = document.createElement('div');
                separator.className = 'wheel-separator';
                separator.style.transform = `rotate(${i * SEGMENT_ANGLE}deg)`;
                wheel.appendChild(separator);

                const labelWrap = document.createElement('div');
                labelWrap.className = 'wheel-label-wrap';
                labelWrap.style.transform = `rotate(${i * SEGMENT_ANGLE + SEGMENT_ANGLE / 2}deg)`;

                const label = document.createElement('span');
                label.className = 'wheel-label';
                label.textContent = name;
                label.dataset.index = String(i);
                label.style.fontSize = labelFontSize(name);

                labelWrap.appendChild(label);
                wheel.appendChild(labelWrap);
            });
        }

        function bouncePin() {
            pin.classList.remove('bounce');
            void pin.offsetWidth;
            pin.classList.add('bounce');
        }

        // ピンは円の真上（絶対角度 -90°/270°）に固定されている。
        // wheelをR度回転させたとき、ローカル角度Aの点は絶対角度 (A + R) に移動するので、
        // ピン直下に来るローカル角度は (270 - R) mod 360。
        // セグメントiはローカル角度 [i*SEGMENT_ANGLE, (i+1)*SEGMENT_ANGLE) を占めるため、
        // 最終的な回転角から「実際にピンが指しているセグメント」を逆算できる。
        function getIndexUnderPin(rotation) {
            const localAngle = ((270 - rotation) % 360 + 360) % 360;
            return Math.floor(localAngle / SEGMENT_ANGLE);
        }

        function spinWheel(onComplete) {
            const extraSpins = 5 + Math.floor(Math.random() * 3); // 5〜7周
            const randomOffset = Math.random() * 360;

            const start = currentRotation;
            const target = start + extraSpins * 360 + randomOffset;
            const delta = target - start;
            const duration = 5000; // 仕様: 5秒程度で結果が出る
            const startTime = performance.now();
            let lastBoundary = Math.floor(start / SEGMENT_ANGLE);

            function frame(now) {
                const elapsed = now - startTime;
                const t = Math.min(1, elapsed / duration);
                const eased = easeOutCubic(t);
                const rotation = start + delta * eased;
                wheel.style.transform = `rotate(${rotation}deg)`;

                const boundary = Math.floor(rotation / SEGMENT_ANGLE);
                if (boundary > lastBoundary) {
                    bouncePin();
                    lastBoundary = boundary;
                }

                if (t < 1) {
                    requestAnimationFrame(frame);
                } else {
                    currentRotation = target;
                    onComplete(getIndexUnderPin(target));
                }
            }

            requestAnimationFrame(frame);
        }

        function hideWheel(callback) {
            wheelFloat.classList.add('hidden');
            setTimeout(() => callback?.(), 500);
        }

        function showResult() {
            resultArea.style.display = 'flex';
            resultName.textContent = currentPresenter;
            resultTheme.textContent = currentTheme;
            announceResult();
            requestAnimationFrame(() => resultArea.classList.add('visible'));
            createConfetti(64);
        }

        function announceResult() {
            resultStatus.textContent = `本日の発表担当者は${currentPresenter}さん、テーマは「${currentTheme}」です。`;
        }

        function swapResultText(updatePresenter, updateTheme) {
            resultText.classList.add('swapping');
            setTimeout(() => {
                if (updatePresenter) currentPresenter = presenters[pickIndex(presenters)];
                if (updateTheme) currentTheme = themes[pickIndex(themes)];
                resultName.textContent = currentPresenter;
                resultTheme.textContent = currentTheme;
                announceResult();
                resultText.classList.remove('swapping');
                createConfetti(48);
                setBusy(false);
            }, 220);
        }

        function startInitialDraw() {
            if (isBusy) return;
            setBusy(true);

            intro.classList.add('hidden');
            setTimeout(() => intro.classList.add('collapsed'), 420);

            // ページ下端で待機していた同じホイールを、そのまま画面中央へ移動させてから回す
            // （別要素への切り替え・クロスフェードは行わない）
            wheelFloat.classList.add('center');

            setTimeout(() => {
                spinWheel((winnerIndex) => {
                    currentPresenter = presenters[winnerIndex];
                    currentTheme = themes[pickIndex(themes)];

                    const landedLabel = wheel.querySelector(`.wheel-label[data-index="${winnerIndex}"]`);
                    landedLabel?.classList.add('landed');

                    setTimeout(() => {
                        hideWheel(() => {
                            showResult();
                            setBusy(false);
                        });
                    }, 1000);
                });
            }, 750);
        }

        // 仕様: 再抽選時はルーレット演出をせず、結果表示からやり直す
        function redrawAll() {
            if (isBusy) return;
            setBusy(true);
            swapResultText(true, true);
        }

        function redrawThemeOnly() {
            if (isBusy) return;
            setBusy(true);
            swapResultText(false, true);
        }

        function createConfetti(count) {
            const colors = ['#4c8cff', '#ff8a00', '#47c736', '#ec5e5c', '#9c27b0', '#09122b'];
            confettiContainer.innerHTML = '';

            for (let i = 0; i < count; i++) {
                const confetti = document.createElement('div');
                confetti.className = 'confetti';
                const angle = Math.random() * Math.PI * 2;
                const distance = 24 + Math.random() * 46;
                confetti.style.setProperty('--tx', `${Math.cos(angle) * distance}vmin`);
                confetti.style.setProperty('--ty', `${Math.sin(angle) * distance}vmin`);
                confetti.style.setProperty('--rot', `${(Math.random() - 0.5) * 720}deg`);
                confetti.style.setProperty('--scale', `${0.7 + Math.random() * 1.0}`);
                confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.animationDelay = `${Math.random() * 0.18}s`;
                confetti.style.animationDuration = `${0.9 + Math.random() * 0.7}s`;
                confettiContainer.appendChild(confetti);
                confetti.addEventListener('animationend', () => confetti.remove());
            }
        }

        spinButton.addEventListener('click', startInitialDraw);
        redrawButton.addEventListener('click', redrawAll);
        themeOnlyButton.addEventListener('click', redrawThemeOnly);

        document.addEventListener('DOMContentLoaded', () => {
            buildWheel();
            document.body.setAttribute('aria-busy', 'false');
            spinButton.focus();
        });
    </script>
</body>
</html>
